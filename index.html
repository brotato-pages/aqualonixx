<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aqualonixx</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<header class="nav">
  <h1>AQUALONIXX</h1>

  <div class="lang">
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('en')">EN</button>
  </div>

  <div class="cart" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h2 data-es="Las pistolas de agua del futuro"
      data-en="The water blasters of the future">
    Las pistolas de agua del futuro
  </h2>

  <p data-es="Potencia. Estilo. Diversión extrema."
     data-en="Power. Style. Extreme fun.">
    Potencia. Estilo. Diversión extrema.
  </p>

  <a href="#shop" class="btn">Shop Now</a>

  <div class="water"></div>
</section>

<!-- SHOP -->
<section id="shop" class="shop">

  <div class="card">
    <h3>Aqualonixx X1</h3>
    <p>USB Recharge • 8m Range</p>
    <button onclick="addToCart('X1')">Comprar</button>
  </div>

  <div class="card">
    <h3>Aqualonixx X2</h3>
    <p>Pro Power • 10m Range</p>
    <button onclick="addToCart('X2')">Comprar</button>
  </div>

</section>

<!-- CART -->
<div id="cart" class="cartPanel">
  <h2>Carrito</h2>
  <ul id="cartList"></ul>
  <button onclick="closeCart()">Cerrar</button>
</div>

<script src="script.js"></script>
</body>
</html>
